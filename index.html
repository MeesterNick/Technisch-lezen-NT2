<!DOCTYPE html>
<html>
<head>
<title>Welkom bij de pagina van Meester Nick
Hier kun je oefenen met Nederlands. Je kunt boven in de menubalk kiezen wat je wilt oefenen.</title>
<style>

body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background-color: #f4fbff;
}

/* MENU BALK */
.navbar {
    background-color: #2c6e91;
    overflow: hidden;
}

.navbar a {
    float: left;
    font-size: 18px;
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}

.dropdown {
    float: left;
    overflow: hidden;
}

.dropdown .dropbtn {
    font-size: 18px;
    border: none;
    outline: none;
    color: white;
    padding: 14px 16px;
    background-color: inherit;
    cursor: pointer;
}

.navbar a:hover, .dropdown:hover .dropbtn {
    background-color: #1f4f69;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
}

.dropdown-content a {
    float: none;
    color: black;
    padding: 12px 16px;
    display: block;
    text-align: left;
}

.dropdown-content a:hover {
    background-color: #ddd;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* INHOUD */
.content {
    padding: 40px;
}

.woord {
    display: inline-block;
    margin: 20px;
    font-size: 28px;
}

</style>
</head>

<body>

<div class="navbar">
  <a href="#" onclick="showHome()">Home</a>

  <!-- Lezen -->
  <div class="dropdown">
    <button class="dropbtn">Lezen ▼</button>
    <div class="dropdown-content">
      <a href="#" onclick="showGroep(3)">Groep 3</a>
      <a href="#" onclick="showGroep(4)">Groep 4</a>
      <a href="#" onclick="showGroep(5)">Groep 5</a>
      <a href="#" onclick="showGroep(6)">Groep 6</a>
      <a href="#" onclick="showGroep(7)">Groep 7</a>
      <a href="#" onclick="showGroep(8)">Groep 8</a>
    </div>
  </div>

  <!-- SPELLING -->
  <div class="dropdown">
    <button class="dropbtn">Spelling ▼</button>
    <div class="dropdown-content">
      <a href="#" onclick="showSpelling(3)">Groep 3</a>
      <a href="#" onclick="showSpelling(4)">Groep 4</a>
      <a href="#" onclick="showSpelling(5)">Groep 5</a>
      <a href="#" onclick="showSpelling(6)">Groep 6</a>
      <a href="#" onclick="showSpelling(7)">Groep 7</a>
      <a href="#" onclick="showSpelling(8)">Groep 8</a>
    </div>
  </div>

  <!-- WOORDENSCHAT -->
  <div class="dropdown">
    <button class="dropbtn">Woordenschat ▼</button>
    <div class="dropdown-content">
      <a href="#" onclick="showWoordenschat(3)">Groep 3</a>
      <a href="#" onclick="showWoordenschat(4)">Groep 4</a>
      <a href="#" onclick="showWoordenschat(5)">Groep 5</a>
      <a href="#" onclick="showWoordenschat(6)">Groep 6</a>
      <a href="#" onclick="showWoordenschat(7)">Groep 7</a>
      <a href="#" onclick="showWoordenschat(8)">Groep 8</a>
    </div>
  </div>
</div>
  <a href="#" onclick="showHome()">Home</a>
  
  <div class="dropdown">
    <button class="dropbtn">Groepen ▼</button>
    <div class="dropdown-content">
      <a href="#" onclick="showI()">Groep 3</a>
      <a href="#">Lange aa</a>
      <a href="#">Korte o</a>
    </div>
  </div>
</div>

<div class="content" id="main">
    <h1>Welkom bij Nederlands op IPS</h1>
    <p>Kies een klank in het menu.</p>
</div>

<script>

function showHome(){
    document.getElementById("main").innerHTML =
    "<h1>Welkom bij NT2 Lezen</h1><p> </p>";
}

function showI(){
    let woorden = ["ik","vis","kip","pit","lip","zit"];
    let output = "<h1>Korte klank i</h1>";
    
    woorden.forEach(w => {
        output += "<div class='woord'>" + w + "</div>";
    });
    
    document.getElementById("main").innerHTML = output;
}
function showGroep(groep){
    document.getElementById("main").innerHTML =
    "<h1>Groep " + groep + "</h1>" +
    "<p>Welkom bij groep " + groep + ".</p>" +
    "<p>Hier komen straks de leesoefeningen.</p>";
}

function showSpelling(groep){
    document.getElementById("main").innerHTML =
    "<h1>Spelling - Groep " + groep + "</h1>" +
    "<p>Hier komen straks spellingsoefeningen.</p>";
}

function showWoordenschat(groep){
    document.getElementById("main").innerHTML =
    "<h1>Woordenschat - Groep " + groep + "</h1>" +
    "<p>Hier komen straks woordenschatoefeningen.</p>";
}
</script>

</body>
</html>
