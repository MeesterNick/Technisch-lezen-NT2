<!DOCTYPE html>
<html>
<head>
<title>NT2 Lezen</title>
<style>

body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background-color: #f4fbff;
}

/* MENU BALK */
.navbar {
    background-color: #2c6e91;
    overflow: hidden;
}

.navbar a {
    float: left;
    font-size: 18px;
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}

.dropdown {
    float: left;
    overflow: hidden;
}

.dropdown .dropbtn {
    font-size: 18px;
    border: none;
    outline: none;
    color: white;
    padding: 14px 16px;
    background-color: inherit;
    cursor: pointer;
}

.navbar a:hover, .dropdown:hover .dropbtn {
    background-color: #1f4f69;
}

.dropdown-content {
    display: none;
    position: absolute;
    background-color: white;
    min-width: 160px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
}

.dropdown-content a {
    float: none;
    color: black;
    padding: 12px 16px;
    display: block;
    text-align: left;
}

.dropdown-content a:hover {
    background-color: #ddd;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* INHOUD */
.content {
    padding: 40px;
}

.woord {
    display: inline-block;
    margin: 20px;
    font-size: 28px;
}

</style>
</head>

<body>

<div class="navbar">
  <a href="#" onclick="showHome()">Home</a>
  
  <div class="dropdown">
    <button class="dropbtn">Klanken ▼</button>
    <div class="dropdown-content">
      <a href="#" onclick="showI()">Korte i</a>
      <a href="#">Lange aa</a>
      <a href="#">Korte o</a>
    </div>
  </div>
</div>

<div class="content" id="main">
    <h1>Welkom bij NT2 Lezen</h1>
    <p>Kies een klank in het menu.</p>
</div>

<script>

function showHome(){
    document.getElementById("main").innerHTML =
    "<h1>Welkom bij NT2 Lezen</h1><p>Kies een klank in het menu.</p>";
}

function showI(){
    let woorden = ["ik","vis","kip","pit","lip","zit"];
    let output = "<h1>Korte klank i</h1>";
    
    woorden.forEach(w => {
        output += "<div class='woord'>" + w + "</div>";
    });
    
    document.getElementById("main").innerHTML = output;
}

</script>

</body>
</html>
